<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartWise — Expense Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f2f5f2; --sidebar:#1a3328; --sidebar-hover:#2a4a3a; --sidebar-fun-hover:#3a2a4a;
--card:#fff; --border:#e0ece4; --green-dark:#1a3328; --green-mid:#2d6a4f; --amber:#E8A838;
--muted:#8BAF93; --secondary:#5a7a6a; --purple:#7b2d8b; --purple-light:#faf5ff;
--purple-border:#e9d5ff; --red:#c1121f; --text:#1a3328;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.ti{line-height:1!important;vertical-align:middle}
#app{display:flex;min-height:100vh}

/* ---------- Sidebar ---------- */
#sidebar{width:248px;min-width:248px;background:var(--sidebar);color:#dbe8df;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.logo .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green-mid),var(--amber));display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.logo .name{font-weight:700;font-size:18px;color:#fff;letter-spacing:.3px}
.logo .name span{color:var(--amber)}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;border:none;background:transparent;color:#c4d6ca;padding:9px 12px;border-radius:9px;font-size:14px;font-family:inherit;cursor:pointer;text-align:left;margin-bottom:2px;position:relative;transition:background .12s,color .12s}
.nav-btn i{font-size:18px}
.nav-btn:hover{background:var(--sidebar-hover);color:#fff}
.nav-btn.active{background:var(--sidebar-hover);color:#fff;font-weight:600}
.nav-btn.fun:hover{background:var(--sidebar-fun-hover)}
.nav-btn.fun.active{background:var(--sidebar-fun-hover);color:#fff}
.nav-pill{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:1px 7px;min-width:18px;text-align:center}
.nav-divider{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:14px 12px 6px;font-weight:600}
.nav-line{height:1px;background:rgba(255,255,255,.08);margin:12px 8px}
.side-bottom{margin-top:auto;background:rgba(255,255,255,.05);border-radius:12px;padding:14px}
.side-bottom .ttl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}
.side-bottom .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.side-bottom .row .v{font-weight:700}
.mini-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.12);overflow:hidden;margin-top:8px}
.mini-bar > div{height:100%;border-radius:4px;background:var(--amber)}

/* ---------- Main ---------- */
#main{flex:1;min-width:0;padding:30px 36px 60px;max-width:1280px}
.page{display:none;animation:fade .2s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h1{font-size:25px;font-weight:700}
.page-head .sub{color:var(--secondary);font-size:13px;margin-top:2px}

/* ---------- Cards ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.section-ttl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--secondary);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.grid{display:grid;gap:16px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1000px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3{grid-template-columns:1fr}}

/* ---------- Phone / tablet ---------- */
@media(max-width:760px){
  #app{flex-direction:column}
  #sidebar{position:sticky;top:0;left:auto;width:100%;min-width:0;height:auto;flex-direction:row;align-items:center;padding:8px 10px;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:120;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  #sidebar::-webkit-scrollbar{height:0}
  #sidebar .logo{padding:0 6px 0 2px;flex-shrink:0}
  #sidebar .logo .name{display:none}
  #sidebar .nav-divider,#sidebar .nav-line,#sidebar .side-bottom{display:none}
  .nav-btn{width:auto;flex-shrink:0;margin-bottom:0;white-space:nowrap;padding:9px 12px}
  .nav-pill{position:static;margin-left:6px}
  #main{padding:18px 14px 48px;max-width:100%}
  .page-head{align-items:flex-start}
  .page-head h1{font-size:21px}
  .grid{gap:12px}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .card{padding:14px}
  .kpi .k-val{font-size:22px}
  .form-grid{grid-template-columns:1fr!important}
  .fun-tabs{gap:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .fun-tab{white-space:nowrap}
  .input,.select{font-size:16px}  /* prevents iOS zoom-on-focus */
  #modal-overlay{padding:20px 12px}
  .quick-strip .qrow{flex-direction:column}
  .quick-strip .qrow .btn{justify-content:center}
}
@media(max-width:430px){
  .grid-4{grid-template-columns:1fr}
  #main{padding:16px 12px 48px}
  .page-head h1{font-size:19px}
  th,td{padding:7px 7px}
}

.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.kpi .k-label{font-size:12px;color:var(--secondary);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .k-val{font-size:27px;font-weight:700;margin-top:8px}
.kpi .k-sub{font-size:12px;color:var(--secondary);margin-top:3px}
.kpi.purple{border-color:var(--purple-border);background:var(--purple-light)}
.pos{color:var(--green-mid)}.neg{color:var(--red)}

/* ---------- Badges / tags ---------- */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;background:#eef4f0;color:var(--green-mid)}
.cat-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600;background:#eef4f0;color:var(--secondary)}

/* ---------- Buttons ---------- */
.btn{font-family:inherit;font-size:13px;font-weight:600;border-radius:9px;padding:8px 14px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.12s}
.btn:hover{border-color:var(--green-mid)}
.btn i{font-size:16px}
.btn-primary{background:var(--green-mid);border-color:var(--green-mid);color:#fff}
.btn-primary:hover{background:#245c43}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-purple:hover{background:#682376}
.btn-ghost{background:transparent;border-color:transparent;color:var(--secondary)}
.btn-ghost:hover{background:#eef4f0;border-color:transparent}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:#f0c9cc}
.btn-danger:hover{background:#fdf0f1;border-color:var(--red)}

/* ---------- Inputs ---------- */
.input,.select{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--text);width:100%;outline:none}
.input:focus,.select:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.label{font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:5px;display:block}
.field{display:flex;flex-direction:column}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:var(--secondary);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid var(--border)}
tbody tr:nth-child(even){background:#f8faf8}
tbody tr:hover{background:#eef4f0}
.tbl-wrap{overflow-x:auto}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:6px 13px;border-radius:8px;background:#fff;border:1px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;color:var(--secondary);font-family:inherit}
.tab:hover{border-color:var(--green-mid)}
.tab.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark)}
.fun-tabs{display:flex;gap:18px;border-bottom:1px solid var(--border);margin-bottom:20px}
.fun-tab{padding:9px 2px;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--secondary);cursor:pointer}
.fun-tab.active{color:var(--purple);border-bottom:2px solid var(--purple)}
.fun-pill{padding:5px 12px;border-radius:20px;background:#fff;border:1px solid var(--purple-border);color:var(--purple);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.fun-pill.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* ---------- Bars ---------- */
.bar-row{margin-bottom:10px}
.bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-top .amt{font-weight:700}
.bar-track{height:9px;background:#eef4f0;border-radius:6px;overflow:hidden}
.bar-track > div{height:100%;border-radius:6px}

.budget-bar{position:relative;height:30px;background:#eef4f0;border-radius:8px;overflow:hidden;margin:10px 0}
.budget-bar .fill{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--amber))}
.budget-bar .marker{position:absolute;top:0;bottom:0;border-left:2px dashed #1a3328aa}
.budget-bar.purple .fill{background:linear-gradient(90deg,var(--purple),#c77dff)}
.budget-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--secondary)}

.daychart{display:flex;align-items:flex-end;gap:3px;height:96px;padding-top:8px}
.daychart .day{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.daychart .day .bar{width:100%;border-radius:3px 3px 0 0;background:#7fb89a;min-height:2px}
.daychart .day .num{font-size:9px;color:var(--muted);margin-top:3px;height:10px}

.momchart{display:flex;align-items:flex-end;gap:14px;height:130px;position:relative;padding:18px 6px 0}
.momchart .mbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;z-index:2}
.momchart .mbar .val{font-size:11px;font-weight:700;margin-bottom:3px}
.momchart .mbar .bar{width:60%;max-width:48px;background:var(--green-mid);border-radius:5px 5px 0 0;min-height:2px}
.momchart .mbar .lbl{font-size:11px;color:var(--secondary);margin-top:6px;text-align:center}
.momchart .budline{position:absolute;left:6px;right:6px;border-top:2px dashed var(--amber);z-index:1}

.stackchart{display:flex;align-items:flex-end;gap:16px;height:150px;padding-top:10px}
.stackchart .sbar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.stackchart .seg{width:62%;max-width:54px}
.stackchart .seg.g{background:var(--green-mid)}
.stackchart .seg.f{background:#c77dff;border-radius:5px 5px 0 0}
.stackchart .lbl{font-size:11px;color:var(--secondary);margin-top:6px}

/* ---------- Alert banner ---------- */
.alert-banner{background:#fff8f0;border:1px solid var(--amber);border-radius:12px;padding:14px 16px;margin-bottom:18px}
.alert-banner .a-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.alert-banner .a-item:not(:last-child){border-bottom:1px solid #f3e3c9}

/* ---------- List rows ---------- */
.list-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border)}
.list-row .grow{flex:1;min-width:0}
.list-row .sub{font-size:12px;color:var(--secondary)}
.chk{width:20px;height:20px;border:2px solid var(--green-mid);border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.chk.on{background:var(--green-mid)}
.done{opacity:.65}
.done .name-txt{text-decoration:line-through}
.warn-line{color:var(--amber);font-size:12px;display:flex;align-items:center;gap:4px;margin-top:2px}

/* store pills (settings) */
.store-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 8px 6px 12px;border-radius:20px;font-weight:600;font-size:13px;margin:0 8px 8px 0}
.store-pill button{border:none;background:rgba(0,0,0,.08);width:18px;height:18px;border-radius:50%;cursor:pointer;color:inherit;display:flex;align-items:center;justify-content:center;font-size:12px}

.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0}

/* recurring card */
.rec-card{border:1px solid var(--border);border-radius:12px;padding:14px;position:relative}
.rec-prog{height:8px;background:#eef4f0;border-radius:5px;overflow:hidden;margin:10px 0 8px}
.rec-prog > div{height:100%;background:var(--green-mid);border-radius:5px}
.rec-prog > div.over{background:var(--amber)}
.rec-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--secondary)}

/* item hint */
.hint{font-size:12px;color:var(--green-mid);margin-top:5px;font-weight:600}
.hint.empty{display:none}

.star-btn{background:none;border:none;font-size:24px;cursor:pointer;color:#ddd;padding:0 2px;font-family:inherit}
.star-btn.on{color:var(--amber)}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state i{font-size:40px;display:block;margin-bottom:10px;opacity:.5}

.rec-item-card{border:1px solid var(--border);border-radius:12px;padding:14px}
.rec-store-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-top:6px;font-size:13px}
.rec-store-row .nm{flex:1;font-weight:600}

.quick-strip{background:#1a3328;border-radius:14px;padding:18px 20px;margin-bottom:22px;color:#fff}
.quick-strip .qh{font-size:13px;color:#9fc4ac;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.quick-strip .qrow{display:flex;gap:10px}
.quick-strip input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:9px;padding:10px 13px;font-family:inherit;font-size:14px;outline:none}
.quick-strip input::placeholder{color:#9fc4ac}

/* ---------- Modal ---------- */
#modal-overlay{position:fixed;inset:0;background:rgba(20,40,30,.45);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:50px 16px;z-index:200;overflow-y:auto}
#modal-overlay.visible{display:flex}
#modal-card{background:#fff;border-radius:16px;width:100%;max-width:480px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
#modal-card h2{font-size:19px;margin-bottom:4px}
.modal-x{float:right;cursor:pointer;color:var(--secondary);font-size:22px;line-height:1}
.preset-pill{padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:#fff;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;color:var(--secondary)}
.preset-pill.active{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}

/* ---------- Auth overlay ---------- */
#auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1a3328,#2d6a4f);display:none;align-items:center;justify-content:center;padding:20px;z-index:400}
#auth-overlay.visible{display:flex}
#auth-card{background:#fff;border-radius:18px;width:100%;max-width:400px;padding:30px;box-shadow:0 25px 60px rgba(0,0,0,.35)}
#auth-card .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
#auth-card .auth-logo .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green-mid),var(--amber));display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px}
#auth-card .auth-logo .name{font-weight:700;font-size:19px}
#auth-card .auth-logo .name span{color:var(--amber)}
#auth-card h2{font-size:20px;margin:14px 0 4px}
#auth-card .auth-sub{color:var(--secondary);font-size:13px;margin-bottom:18px}
#auth-card .field{margin-bottom:12px}
#auth-msg{font-size:13px;margin:6px 0 12px;min-height:16px}
#auth-msg.err{color:var(--red)}#auth-msg.ok{color:var(--green-mid)}
.auth-toggle{text-align:center;font-size:13px;color:var(--secondary);margin-top:16px}
.auth-toggle a{color:var(--green-mid);font-weight:600;cursor:pointer}
#cloud-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--secondary)}

/* ---------- Toast ---------- */
#toast{position:fixed;bottom:24px;right:24px;background:#1a3328;color:#fff;padding:13px 20px;border-radius:11px;font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:.28s;z-index:300;display:flex;align-items:center;gap:9px}
#toast.visible{transform:none;opacity:1}
#toast i{color:var(--amber);font-size:18px}

.spacer{height:16px}
.row-flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.mt12{margin-top:12px}.mt16{margin-top:16px}.mb12{margin-bottom:12px}
.txt-sec{color:var(--secondary)}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:5px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#bcd2c4;border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="logo">
      <div class="mark"><i class="ti ti-shopping-cart-bolt"></i></div>
      <div class="name">Cart<span>Wise</span></div>
    </div>
    <button class="nav-btn" data-action="navigate" data-page="dashboard"><i class="ti ti-dashboard"></i> Dashboard <span class="nav-pill" id="nav-alert-pill" style="display:none"></span></button>
    <button class="nav-btn" data-action="navigate" data-page="add"><i class="ti ti-circle-plus"></i> Add Purchase</button>
    <button class="nav-btn" data-action="navigate" data-page="list"><i class="ti ti-shopping-cart"></i> Grocery List</button>
    <button class="nav-btn" data-action="navigate" data-page="history"><i class="ti ti-history"></i> History</button>
    <button class="nav-btn" data-action="navigate" data-page="analytics"><i class="ti ti-chart-line"></i> Analytics</button>
    <button class="nav-btn" data-action="navigate" data-page="recommendations"><i class="ti ti-bulb"></i> Best Prices</button>
    <div class="nav-divider">Life &amp; Fun</div>
    <button class="nav-btn fun" data-action="navigate" data-page="fun"><i class="ti ti-confetti"></i> Fun Spending</button>
    <div class="nav-line"></div>
    <button class="nav-btn" data-action="navigate" data-page="settings"><i class="ti ti-settings"></i> Settings</button>
    <div class="side-bottom" id="side-bottom"></div>
  </nav>
  <main id="main">
    <div class="page" id="page-dashboard"></div>
    <div class="page" id="page-add"></div>
    <div class="page" id="page-list"></div>
    <div class="page" id="page-history"></div>
    <div class="page" id="page-analytics"></div>
    <div class="page" id="page-recommendations"></div>
    <div class="page" id="page-fun"></div>
    <div class="page" id="page-settings"></div>
  </main>
</div>
<div id="modal-overlay"><div id="modal-card"><div id="modal-body"></div></div></div>
<div id="auth-overlay"><div id="auth-card"></div></div>
<div id="toast"></div>

<script type="module">
/* Supabase client loaded from CDN, exposed for the main (classic) script. */
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
window.__createSupabase = createClient;
</script>
<script>
/* ===================== CLOUD CONFIG =====================
   To enable cross-device login + sync, paste your Supabase project's
   URL and anon (public) key below. Both are safe to expose in client code.
   Leave them blank to run in local-only mode (no account needed).         */
const SUPABASE_URL = 'https://ykqnbgctvceixmiqroes.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_SOZchnlplTNw4Nch4iNgsA_7gBlAikV';

let SB = null;           // supabase client (null = cloud disabled)
let CUR_USER = null;     // logged-in user object
let cloudReady = false;  // true once initial cloud load is done
let _pushTimer = null;

/* ===================== STATE ===================== */
const STATE = { expenses:[], groceryList:[], recurring:[], budgets:{}, stores:[], funExpenses:[], wishlist:[], funBudgets:{} };
function save(){ localStorage.setItem('cartwise', JSON.stringify(STATE)); schedulePush(); }
function load(){ const r = localStorage.getItem('cartwise'); if(r) Object.assign(STATE, JSON.parse(r)); else resetToSampleData(); }

/* ===================== CLOUD SYNC ===================== */
function cloudEnabled(){ return !!(SUPABASE_URL && SUPABASE_ANON_KEY && window.__createSupabase); }
function schedulePush(){
  if(!SB || !CUR_USER || !cloudReady) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(pushCloud, 600);
}
async function pushCloud(){
  if(!SB || !CUR_USER) return;
  try{
    setCloudStatus('saving');
    const { error } = await SB.from('cartwise_data')
      .upsert({ user_id:CUR_USER.id, data:STATE, updated_at:new Date().toISOString() }, { onConflict:'user_id' });
    setCloudStatus(error ? 'error' : 'synced');
    if(error) console.error('Cloud save failed:', error.message);
  }catch(e){ setCloudStatus('error'); console.error(e); }
}
async function pullCloud(){
  if(!SB || !CUR_USER) return false;
  const { data, error } = await SB.from('cartwise_data').select('data').eq('user_id', CUR_USER.id).maybeSingle();
  if(error){ console.error('Cloud load failed:', error.message); return false; }
  if(data && data.data){ Object.assign(STATE, { expenses:[], groceryList:[], recurring:[], budgets:{}, stores:[], funExpenses:[], wishlist:[], funBudgets:{} }, data.data); localStorage.setItem('cartwise', JSON.stringify(STATE)); return true; }
  return false;
}
async function initCloud(){
  if(!cloudEnabled()) return;
  SB = window.__createSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data:{ session } } = await SB.auth.getSession();
  if(session && session.user){ await onSignedIn(session.user, false); }
  else { showAuthOverlay(); }
  SB.auth.onAuthStateChange((event, sess)=>{
    if(event==='SIGNED_IN' && sess && sess.user && (!CUR_USER || CUR_USER.id!==sess.user.id)){ onSignedIn(sess.user, false); }
    if(event==='SIGNED_OUT'){ CUR_USER=null; cloudReady=false; showAuthOverlay(); }
  });
  // Refresh from cloud when returning to the tab (e.g. after editing on another device).
  document.addEventListener('visibilitychange', async()=>{
    if(document.visibilityState==='visible' && SB && CUR_USER){ if(await pullCloud()){ const p=document.querySelector('.page.active'); if(p) render(p.id.replace('page-','')); renderSidebarBottom(); } }
  });
}
async function onSignedIn(user, isFreshSignup){
  CUR_USER = user;
  hideAuthOverlay();
  const hadCloud = await pullCloud();
  cloudReady = true;
  if(!hadCloud){ await pushCloud(); }  // first login on this account: migrate whatever is local up to the cloud
  setCloudStatus('synced');
  goTo('dashboard');
}
async function doLogout(){
  if(SB) await SB.auth.signOut();
  CUR_USER=null; cloudReady=false;
  showToast('Logged out');
  showAuthOverlay();
}
function setCloudStatus(s){
  const el=document.getElementById('cloud-status'); if(!el) return;
  const map={ synced:['ti-cloud-check','#4ade80','Synced'], saving:['ti-cloud-up','var(--amber)','Saving…'], error:['ti-cloud-x','#f87171','Sync error'] };
  const [ic,col,txt]=map[s]||map.synced;
  el.innerHTML=`<i class="ti ${ic}" style="color:${col}"></i> ${txt}`;
}

/* ===================== DERIVED HELPERS ===================== */
function buildRecMap(){
  const map = {};
  STATE.expenses.forEach(e=>{
    if(!map[e.item]) map[e.item]={};
    if(!map[e.item][e.store]) map[e.item][e.store]={ sum:0, count:0, prices:[], dates:[] };
    const s = map[e.item][e.store];
    s.sum += e.price; s.count++; s.prices.push(e.price); s.dates.push(e.date);
  });
  Object.keys(map).forEach(item=>{
    const stores = map[item];
    let best=null;
    Object.keys(stores).forEach(st=>{
      const s = stores[st];
      s.avgPrice = s.sum/s.count;
      const order = s.dates.map((d,i)=>({d,p:s.prices[i]})).sort((a,b)=>a.d.localeCompare(b.d));
      s.trend = order[order.length-1].p - order[0].p;
      if(!best || s.avgPrice < stores[best].avgPrice) best = st;
    });
    map[item].__best = best;
  });
  return map;
}
function itemStores(item, map){ return Object.keys(map[item]).filter(k=>k!=='__best'); }
function monthExpenses(key){ return STATE.expenses.filter(e=>monthKey(e.date)===key); }
function monthTotal(key){ return monthExpenses(key).reduce((s,e)=>s+e.price*e.qty,0); }
function funMonthExpenses(key){ return STATE.funExpenses.filter(e=>monthKey(e.date)===key); }
function funMonthTotal(key){ return funMonthExpenses(key).reduce((s,e)=>s+e.amount,0); }
function curMonth(){ return today().slice(0,7); }
function recurringDueDate(r){ return addDays(r.lastBought, r.interval); }
function recurringOverdue(r){ return recurringDueDate(r) <= today(); }
function potentialSavings(key){
  const map = buildRecMap();
  let total=0;
  monthExpenses(key).forEach(e=>{
    const st = map[e.item]; if(!st) return;
    const best = st.__best;
    if(best && map[e.item][best].avgPrice < e.price){
      total += (e.price - map[e.item][best].avgPrice) * e.qty;
    }
  });
  return total;
}
function priceAlerts(){
  const alerts=[];
  const byItemStore={};
  STATE.expenses.forEach(e=>{
    const k=e.item+'@@'+e.store;
    if(!byItemStore[k]) byItemStore[k]={prices:[],dates:[],item:e.item,store:e.store};
    byItemStore[k].prices.push(e.price); byItemStore[k].dates.push(e.date);
  });
  Object.values(byItemStore).forEach(g=>{
    if(g.prices.length<2) return;
    const order=g.dates.map((d,i)=>({d,p:g.prices[i]})).sort((a,b)=>a.d.localeCompare(b.d));
    const latest=order[order.length-1].p;
    const hist=order.slice(0,-1);
    const avg=hist.reduce((s,o)=>s+o.p,0)/hist.length;
    if(latest > avg*1.15){
      alerts.push({item:g.item,store:g.store,pct:Math.round((latest/avg-1)*100),latest,avg});
    }
  });
  return alerts;
}
function alertCount(){ return priceAlerts().length + STATE.recurring.filter(recurringOverdue).length; }

  const pct = budget? Math.min(100,(gTot/budget)*100) : 0;

    <div class="ttl">This month</div>
    <div class="row"><span>Groceries</span><span class="v" style="color:var(--amber)">${fmt$(gTot)}</span></div>

  const kpis = `<div class="grid grid-4 mb12">
    <div class="kpi"><div class="k-label"><i class="ti ti-shopping-cart"></i> This month</div><div class="k-val">${fmt$(curTotal)}</div><div class="k-sub">${exps.length} purchases</div></div>
    <div class="kpi"><div class="k-label"><i class="ti ti-trending-up"></i> Forecast</div><div class="k-val">${fmt$(forecast)}</div><div class="k-sub">projected for ${monthLabel(mk).split(' ')[0]}</div></div>
    <div class="kpi"><div class="k-label"><i class="ti ti-arrows-diff"></i> vs last month</div><div class="k-val ${diff<=0?'pos':'neg'}">${diff<=0?'−':'+'}${fmt$(Math.abs(diff))}</div><div class="k-sub">${fmt$(lastTotal)} last month</div></div>
    <div class="kpi"><div class="k-label"><i class="ti ti-pig-money"></i> Potential savings</div><div class="k-val pos">${fmt$(savings)}</div><div class="k-sub">by switching stores</div></div>
  </div>`;

  let budgetHtml='';
  if(budget){
    const spentPct = Math.min(100,(curTotal/budget)*100);
    const markPct = Math.min(100,(dayOfMonth/dim)*100);
    const expected = budget*(dayOfMonth/dim);
    let status, scolor;
    if(curTotal>budget){ status='Over budget'; scolor='var(--red)'; }
    else if(curTotal>expected){ status='Watch spending'; scolor='var(--amber)'; }
    else { status='On track'; scolor='var(--green-mid)'; }
    budgetHtml = `<div class="card mb12">
      <div class="section-ttl"><i class="ti ti-target"></i> Monthly budget <span style="margin-left:auto;color:${scolor};text-transform:none;letter-spacing:0">${status}</span></div>
      <div class="budget-bar"><div class="fill" style="width:${spentPct}%"></div><div class="marker" style="left:${markPct}%"></div></div>
      <div class="budget-labels"><span>Spent ${fmt$(curTotal)}</span><span>Expected ${fmt$(expected)}</span><span>Budget ${fmt$(budget)}</span></div>
    </div>`;
  }

  const daySpend = {};
  for(let d=1;d<=dim;d++) daySpend[d]=0;
  exps.forEach(e=>{ const d=+e.date.slice(8,10); daySpend[d]+=e.price*e.qty; });
  const maxSpend = Math.max(...Object.values(daySpend),1);
  const todayDay = now.getDate();
  let dayBars='';
  for(let d=1;d<=dim;d++){
    const h = Math.max(2,(daySpend[d]/maxSpend)*80);
    const col = d===todayDay?'#E8A838':(daySpend[d]===0?'#e8ede8':'#7fb89a');
    dayBars += `<div class="day"><div class="bar" style="height:${h}px;background:${col}" title="${monthLabel(mk).split(' ')[0]} ${d}: ${fmt$(daySpend[d])}"></div><div class="num">${d%5===0?d:''}</div></div>`;
  }
  const dayChart = `<div class="card mb12"><div class="section-ttl"><i class="ti ti-calendar"></i> Daily spend</div><div class="daychart">${dayBars}</div></div>`;

  const catTot={}, storeTot={};
  exps.forEach(e=>{ catTot[e.category]=(catTot[e.category]||0)+e.price*e.qty; storeTot[e.store]=(storeTot[e.store]||0)+e.price*e.qty; });
  const catBars = Object.entries(catTot).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`
    <div class="bar-row"><div class="bar-top"><span><i class="ti ${CAT_ICONS[c]||'ti-box'}"></i> ${c}</span><span class="amt">${fmt$(v)}</span></div>
    <div class="bar-track"><div style="width:${(v/curTotal*100)||0}%;background:var(--green-mid)"></div></div></div>`).join('') || '<div class="txt-sec">No data yet</div>';
  const storeBars = Object.entries(storeTot).sort((a,b)=>b[1]-a[1]).map(([s,v])=>`
    <div class="bar-row"><div class="bar-top"><span>${esc(s)}</span><span class="amt">${fmt$(v)}</span></div>
    <div class="bar-track"><div style="width:${(v/curTotal*100)||0}%;background:${storeColor(s)}"></div></div></div>`).join('') || '<div class="txt-sec">No data yet</div>';
  const breakdown = `<div class="grid grid-2 mb12">
    <div class="card"><div class="section-ttl"><i class="ti ti-chart-pie"></i> By category</div>${catBars}</div>
    <div class="card"><div class="section-ttl"><i class="ti ti-building-store"></i> By store</div>${storeBars}</div>
  </div>`;

  const months = [...new Set(STATE.expenses.map(e=>monthKey(e.date)))].sort().reverse();
  const monthCards = months.map(k=>{
    const t=monthTotal(k); const b=STATE.budgets[k];
    const over = b!=null? (t>b) : null;
    return `<div class="card" style="cursor:pointer" data-action="goToHistoryMonth" data-month="${k}">
      <div style="font-weight:700">${monthLabel(k)}</div>
      <div style="font-size:22px;font-weight:700;margin:4px 0">${fmt$(t)}</div>
      ${b!=null?`<div class="badge" style="background:${over?'#fdecec':'#eaf5ee'};color:${over?'var(--red)':'var(--green-mid)'}">${over?'Over by '+fmt$(t-b):'Under by '+fmt$(b-t)}</div>`:'<div class="txt-sec" style="font-size:12px">No budget set</div>'}
    </div>`;
  }).join('');
  const monthGrid = `<div class="section-ttl mt16"><i class="ti ti-calendar-month"></i> Month by month</div><div class="grid grid-3">${monthCards}</div>`;

  document.getElementById('page-dashboard').innerHTML = `
    <div class="page-head">
      <div><h1>${monthLabel(mk)}</h1><div class="sub">${new Date(today()).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div></div>
      <button class="btn btn-primary" data-action="openBudgetModal"><i class="ti ti-target"></i> Set budget</button>
    </div>
    ${alertHtml}${kpis}${budgetHtml}${dayChart}${breakdown}${monthGrid}`;
}

function renderTrendSvg(){
  const item=document.getElementById('trend-item').value;
  const recs = STATE.expenses.filter(e=>e.item===item).sort((a,b)=>a.date.localeCompare(b.date));
  const wrap=document.getElementById('trend-svg-wrap');
  if(!recs.length){ wrap.innerHTML='<div class="txt-sec">No data</div>'; return; }
  const W=600,H=140,padL=44,padR=14,padT=14,padB=26;
  const dates=[...new Set(recs.map(r=>r.date))].sort();
  const prices=recs.map(r=>r.price);
  const minP=Math.min(...prices), maxP=Math.max(...prices);
  const pr = (maxP-minP)||1;
  const minD=new Date(dates[0]).getTime(), maxD=new Date(dates[dates.length-1]).getTime();
  const dr = (maxD-minD)||1;
  const X = d=> padL + ((new Date(d).getTime()-minD)/dr)*(W-padL-padR);
  const Y = p=> padT + (1-(p-minP)/pr)*(H-padT-padB);
  const byStore={};
  recs.forEach(r=>{ (byStore[r.store]=byStore[r.store]||[]).push(r); });
  let svg=`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="overflow:visible">`;
  [minP,(minP+maxP)/2,maxP].forEach(p=>{ const y=Y(p); svg+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#eef4f0"/><text x="${padL-6}" y="${y+3}" font-size="9" fill="#8BAF93" text-anchor="end">${fmt$(p)}</text>`; });
  Object.entries(byStore).forEach(([st,arr])=>{
    const c=storeColor(st);
    const pts=arr.map(r=>`${X(r.date)},${Y(r.price)}`).join(' ');
    if(arr.length>1) svg+=`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2"/>`;
    arr.forEach(r=>{ svg+=`<circle cx="${X(r.date)}" cy="${Y(r.price)}" r="4" fill="${c}"><title>${esc(r.date)} · ${esc(st)} · ${fmt$(r.price)}</title></circle>`; });
  });
  [dates[0],dates[Math.floor((dates.length-1)/2)],dates[dates.length-1]].forEach((d,i)=>{
    const anchor=i===0?'start':i===2?'end':'middle';
    svg+=`<text x="${X(d)}" y="${H-8}" font-size="9" fill="#8BAF93" text-anchor="${anchor}">${d.slice(5)}</text>`;
  });
  svg+='</svg>';
  const legend=`<div class="legend">${Object.keys(byStore).map(s=>`<span><span class="dot" style="background:${storeColor(s)}"></span>${esc(s)}</span>`).join('')}</div>`;
  wrap.innerHTML=svg+legend;
}

function renderRecommendations(){
  const map = buildRecMap();
  const items = Object.keys(map).sort();
  const savings = potentialSavings(curMonth());
  const cards = items.map(item=>{
    const stores = itemStores(item, map);
    const best = map[item].__best;
    const sorted = stores.slice().sort((a,b)=>map[item][a].avgPrice-map[item][b].avgPrice);
    const totalPurchases = stores.reduce((s,st)=>s+map[item][st].count,0);
    const rows = sorted.map(st=>{
      const s=map[item][st]; const isBest=st===best;
      let arrow='';
      if(s.trend>0.05) arrow='<i class="ti ti-arrow-up-right" style="color:var(--red)" title="trending up"></i>';
      else if(s.trend<-0.05) arrow='<i class="ti ti-arrow-down-right" style="color:var(--green-mid)" title="trending down"></i>';
      return `<div class="rec-store-row" style="${isBest?'background:#f0f7f3;border:1px solid #c3dece':'opacity:.7'}">
        <span style="width:16px">${isBest?'<i class="ti ti-star-filled" style="color:var(--amber)"></i>':''}</span>
        <span class="nm">${esc(st)}</span>
        <span class="txt-sec">${s.count} visit${s.count!==1?'s':''}</span>
        <span style="width:16px">${arrow}</span>
        <span style="font-weight:700;min-width:54px;text-align:right">${fmt$(s.avgPrice)}</span>
      </div>`;
    }).join('');
    const prices=sorted.map(st=>map[item][st].avgPrice);
    const footer = sorted.length>=2 ? `<div class="txt-sec mt12" style="font-size:12px"><i class="ti ti-pig-money" style="color:var(--green-mid)"></i> Save <b>${fmt$(Math.max(...prices)-Math.min(...prices))}</b>/unit vs most expensive</div>`:'';
    return `<div class="rec-item-card">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
        <div><div style="font-weight:700;font-size:16px">${esc(item)}</div>
        <div class="txt-sec" style="font-size:12px">${totalPurchases} purchase${totalPurchases!==1?'s':''} across ${stores.length} store${stores.length!==1?'s':''}</div></div>
        <button class="btn btn-sm" data-action="addRecToList" data-item="${esc(item)}"><i class="ti ti-plus"></i> List</button>
      </div>
      <div class="mt12">${rows}</div>${footer}
    </div>`;
  }).join('');
  document.getElementById('page-recommendations').innerHTML = `
    <div class="page-head"><div><h1>Best Prices</h1><div class="sub">Where to buy each item for less</div></div></div>
    <div class="card mb12" style="background:#eef7f1;border-color:#c3dece;display:flex;align-items:center;gap:12px">
      <i class="ti ti-pig-money" style="font-size:30px;color:var(--green-mid)"></i>
      <div><div style="font-weight:700;font-size:18px">You could save ${fmt$(savings)} this month</div>
      <div class="txt-sec">by buying each item at its cheapest store based on your history</div></div>
    </div>
    <div class="grid grid-2">${cards||'<div class="empty-state"><i class="ti ti-bulb-off"></i>No purchase history yet</div>'}</div>`;
}

function showToast(msg){ const t=document.getElementById('toast'); t.innerHTML=`<i class="ti ti-circle-check"></i> ${esc(msg)}`; t.classList.add('visible'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('visible'),2400); }
function openModal(html){ document.getElementById('modal-body').innerHTML=html; document.getElementById('modal-overlay').classList.add('visible'); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('visible'); }

function addStore(){
  const inp=document.getElementById('new-store-input'); const v=inp.value.trim();
  if(!v) return;
  if(!STATE.stores.some(s=>s.toLowerCase()===v.toLowerCase())){ STATE.stores.push(v); save(); showToast('Store added'); renderSettings(); renderSidebarBottom(); }
  else { inp.value=''; }
}

  newRecInterval=14; newRecCustom=false;
  const catOpts=CATEGORIES.map(c=>`<option>${c}</option>`).join('');
  openModal(`<span class="modal-x" data-action="closeModal">×</span><h2>Add recurring item</h2>
    <div class="spacer"></div>
    <div class="field mb12"><label class="label">Item</label><input class="input" id="rec-item" placeholder="e.g. Milk" autocomplete="off"></div>
    <label class="label">Interval</label>
    <div class="row-flex mb12" id="rec-presets">
      ${[7,10,14,21,30].map(d=>`<button class="preset-pill ${d===14?'active':''}" data-action="setIntervalPreset" data-days="${d}">${d}d</button>`).join('')}
      <button class="preset-pill" data-action="toggleRecCustom" id="rec-custom-btn">Custom…</button>
    </div>
    <div id="rec-custom-wrap" style="display:none" class="mb12"><input class="input" type="number" id="rec-custom" placeholder="days" min="1" style="max-width:140px"></div>
    <div class="grid grid-2 mb12">
      <div class="field"><label class="label">Store</label><input class="input" id="rec-store" list="store-dl-rec" placeholder="Type a store name" autocomplete="off">${storeDatalist('store-dl-rec')}</div>
      <div class="field"><label class="label">Category</label><select class="select" id="rec-category">${catOpts}</select></div>
    </div>
    <div class="field mb12"><label class="label">Last bought</label><input class="input" type="date" id="rec-last" value="${today()}" max="${today()}"></div>
    <div class="card" style="background:#f8faf8;padding:12px" id="rec-preview"></div>
    <div class="mt16 row-flex"><button class="btn btn-primary" data-action="saveNewRecurring"><i class="ti ti-device-floppy"></i> Save</button><button class="btn btn-ghost" data-action="closeModal">Cancel</button></div>`);
  document.getElementById('rec-item').addEventListener('input',updateRecPreview);
  document.getElementById('rec-last').addEventListener('input',updateRecPreview);
  document.getElementById('rec-store').addEventListener('change',updateRecPreview);
  updateRecPreview();
}
function curRecInterval(){ return newRecCustom ? (parseInt(document.getElementById('rec-custom')?.value)||0) : newRecInterval; }
function updateRecPreview(){
  const item=document.getElementById('rec-item')?.value.trim()||'Item';
  const last=document.getElementById('rec-last')?.value||today();
  const iv=curRecInterval();
  const due=iv?addDays(last,iv):null;
  const dueTxt = due? new Date(due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
  document.getElementById('rec-preview').innerHTML=`<i class="ti ti-bulb" style="color:var(--amber)"></i> <b>${esc(item)}</b> will next be due on <b>${dueTxt}</b> (every ${iv||'?'} days)`;
}

/* ===================== ACTIONS ===================== */
const ACTIONS = {
  navigate(el){ goTo(el.dataset.page); },
  closeModal(){ closeModal(); },
  openBudgetModal(){
    const mk=curMonth();
    openModal(`<span class="modal-x" data-action="closeModal">×</span><h2>Set budget</h2>
      <div class="txt-sec mb12">Grocery budget for ${monthLabel(mk)}</div>
      <input class="input" type="number" id="budget-input" value="${STATE.budgets[mk]||''}" placeholder="e.g. 250" min="0">
      <div class="mt16 row-flex"><button class="btn btn-primary" data-action="saveBudget"><i class="ti ti-check"></i> Save</button><button class="btn btn-ghost" data-action="closeModal">Cancel</button></div>`);
  },
  saveBudget(){
    const v=parseFloat(document.getElementById('budget-input').value);
    if(!isNaN(v)){ STATE.budgets[curMonth()]=v; save(); closeModal(); showToast('Budget saved'); renderDashboard(); renderSidebarBottom(); }
  },
  addRecurringToList(el){
    const r=STATE.recurring.find(x=>x.id===el.dataset.id); if(!r) return;
    if(!STATE.groceryList.some(i=>!i.done && i.item.toLowerCase()===r.item.toLowerCase()))
      STATE.groceryList.push({ id:genId(), item:r.item, qty:1, store:r.store, note:'', done:false });
    save(); showToast(`${r.item} added to list`);
    const active=document.querySelector('.page.active').id.replace('page-','');
    render(active); renderSidebarBottom();
  },
  goToHistoryMonth(el){ historyMonth=el.dataset.month; goTo('history'); },
  submitQuick(){
    const inp=document.getElementById('quick-input'); const raw=inp.value.trim(); if(!raw) return;
    const tokens=raw.split(/\s+/);
    let price=null, store=null, qty=null, item=null;
    const pm=raw.match(/(\d+\.\d{1,2})\s*$/); if(pm) price=parseFloat(pm[1]);
    for(const s of STATE.stores){ if(raw.toLowerCase().includes(s.toLowerCase())){ store=s; break; } }
    const priceStr = pm?pm[1]:null;
    for(const t of tokens){ if(/^\d+$/.test(t) && t!==priceStr){ qty=parseInt(t); break; } }
    item=tokens[0];
    if(price==null){ showToast('Could not read a price'); return; }
    const map=buildRecMap();
    const match=Object.keys(map).find(k=>k.toLowerCase()===item.toLowerCase());
    const ref = match? STATE.expenses.find(e=>e.item.toLowerCase()===item.toLowerCase()) : null;
    const exp={ id:genId(), date:today(), item, qty:qty||1, price, store:store||STATE.stores[0]||'', category:ref?ref.category:'Other', unit:ref?ref.unit:'each', note:'', meal:'' };
    STATE.expenses.push(exp);
    STATE.recurring.forEach(r=>{ if(r.item.toLowerCase()===item.toLowerCase()) r.lastBought=today(); });
    save(); inp.value=''; showToast('Purchase saved!'); renderSidebarBottom();
  },
  submitAddForm(){
    const item=document.getElementById('f-item').value.trim();
    const price=parseFloat(document.getElementById('f-price').value);
    if(!item){ showToast('Enter an item'); return; }
    if(isNaN(price)){ showToast('Enter a price'); return; }
    const store=document.getElementById('f-store').value.trim();
    rememberStore(store);
    const exp={
      id:genId(), date:document.getElementById('f-date').value||today(), item,
      qty:parseFloat(document.getElementById('f-qty').value)||1, price,
      store,
      category:document.getElementById('f-category').value,
      unit:document.getElementById('f-unit').value,
      meal:document.getElementById('f-meal').value.trim(),
      note:document.getElementById('f-note').value.trim()
    };
    STATE.expenses.push(exp);
    STATE.recurring.forEach(r=>{ if(r.item.toLowerCase()===item.toLowerCase()) r.lastBought=exp.date; });
    save(); showToast('Purchase saved!'); renderAdd(); renderSidebarBottom();
  },
  addListItem(){
    const item=document.getElementById('li-item').value.trim(); if(!item){ showToast('Enter an item'); return; }
    let store=document.getElementById('li-store').value.trim();
    const qty=parseInt(document.getElementById('li-qty').value)||1;
    const note=document.getElementById('li-note').value.trim();
    if(!store){ const map=buildRecMap(); const m=Object.keys(map).find(k=>k.toLowerCase()===item.toLowerCase()); store=m?map[m].__best:''; }
    rememberStore(store);
    STATE.groceryList.push({ id:genId(), item, qty, store, note, done:false });
    save(); showToast('Added to list'); renderList();
  },
  toggleListItem(el){ const i=STATE.groceryList.find(x=>x.id===el.dataset.id); if(i){ i.done=!i.done; save(); renderList(); } },
  removeListItem(el){ STATE.groceryList=STATE.groceryList.filter(x=>x.id!==el.dataset.id); save(); renderList(); },
  clearDone(){ STATE.groceryList=STATE.groceryList.filter(i=>!i.done); save(); showToast('Cleared done items'); renderList(); },
  openTripMode(){
    const pending=STATE.groceryList.filter(i=>!i.done);
    const groups={};
    pending.forEach(i=>{ const s=i.store||'Unassigned'; (groups[s]=groups[s]||[]).push(i); });
    const html=Object.keys(groups).length? Object.entries(groups).map(([s,items])=>`
      <div class="card mb12" style="padding:14px">
        <div style="display:flex;align-items:center;gap:8px;font-weight:700"><span class="dot" style="background:${storeColor(s)}"></span>${esc(s)} <span class="badge" style="margin-left:auto">${items.length}</span></div>
        <div class="mt12">${items.map(i=>`<div class="list-row" style="padding:6px 0;border:none"><i class="ti ti-point" style="color:var(--muted)"></i><div class="grow">${esc(i.item)} ${i.qty>1?`×${i.qty}`:''} ${i.note?`<span class="txt-sec">· ${esc(i.note)}</span>`:''}</div></div>`).join('')}</div>
      </div>`).join('') : '<div class="empty-state"><i class="ti ti-map-off"></i>Nothing to shop for</div>';
    openModal(`<span class="modal-x" data-action="closeModal">×</span><h2>🗺️ Trip mode</h2><div class="txt-sec mb12">Items grouped by store</div>${html}
      <button class="btn btn-ghost" data-action="closeModal">Close</button>`);
  },
  setHistoryMonth(el){ historyMonth=el.dataset.month; renderHistory(); },
  exportCSV(){ exportCSV(); },
  deleteExpense(el){ STATE.expenses=STATE.expenses.filter(x=>x.id!==el.dataset.id); save(); showToast('Deleted'); renderHistory(); renderSidebarBottom(); },
  addRecToList(el){
    const item=el.dataset.item; const map=buildRecMap();
    const store=map[item]?map[item].__best:'';
    if(!STATE.groceryList.some(i=>!i.done && i.item.toLowerCase()===item.toLowerCase()))
      STATE.groceryList.push({ id:genId(), item, qty:1, store, note:'', done:false });
    save(); showToast(`${item} added to list`); renderSidebarBottom();
  },
  funTab(el){ funSubPage=el.dataset.tab; document.querySelectorAll('.fun-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===funSubPage)); renderFunContent(); },
  toggleFunBudgetEditor(){
    const wrap=document.getElementById('fun-budget-editor');
    if(wrap.innerHTML){ wrap.innerHTML=''; return; }
    const mk=curMonth();
    wrap.innerHTML=`<div class="card mb12" style="border-color:var(--purple-border)">
      <div class="row-flex"><label class="label" style="margin:0">Fun budget for ${monthLabel(mk)}:</label>
      <input class="input" type="number" id="fun-budget-input" value="${STATE.funBudgets[mk]||''}" placeholder="e.g. 200" style="max-width:160px">
      <button class="btn btn-purple" data-action="saveFunBudget"><i class="ti ti-check"></i> Save</button></div></div>`;
  },
  saveFunBudget(){
    const v=parseFloat(document.getElementById('fun-budget-input').value);
    if(!isNaN(v)){ STATE.funBudgets[curMonth()]=v; save(); showToast('Fun budget saved'); renderFun(); renderSidebarBottom(); }
  },
  setRating(el){ funRating=parseInt(el.dataset.rating); document.querySelectorAll('#fun-stars .star-btn').forEach((b,i)=>b.classList.toggle('on',i<funRating)); },
  submitFunForm(){
    const what=document.getElementById('fun-what').value.trim();
    const amount=parseFloat(document.getElementById('fun-amount').value);
    if(!what){ showToast('Enter what you did'); return; }
    if(isNaN(amount)){ showToast('Enter an amount'); return; }
    STATE.funExpenses.push({ id:genId(), date:document.getElementById('fun-date').value||today(),
      what, place:document.getElementById('fun-place').value.trim(),
      category:document.getElementById('fun-category').value, amount, rating:funRating,
      note:document.getElementById('fun-note').value.trim() });
    save(); funRating=5; showToast('Fun saved! 🎉'); renderFun(); renderSidebarBottom();
  },
  funHistTab(el){ funHistMonth=el.dataset.month; renderFunContent(); },
  deleteFun(el){ STATE.funExpenses=STATE.funExpenses.filter(x=>x.id!==el.dataset.id); save(); showToast('Deleted'); renderFunContent(); renderSidebarBottom(); },
  addWishItem(){
    const what=document.getElementById('wish-what').value.trim(); if(!what){ showToast('Enter a wish'); return; }
    STATE.wishlist.push({ id:genId(), what, place:document.getElementById('wish-place').value.trim(),
      category:document.getElementById('wish-category').value, note:document.getElementById('wish-note').value.trim(), done:false });
    save(); showToast('Added to wishlist'); renderFunContent();
  },
  toggleWish(el){ const w=STATE.wishlist.find(x=>x.id===el.dataset.id); if(w){ w.done=!w.done; save(); renderFunContent(); } },
  deleteWish(el){ STATE.wishlist=STATE.wishlist.filter(x=>x.id!==el.dataset.id); save(); renderFunContent(); },
  removeStore(el){ STATE.stores=STATE.stores.filter(s=>s!==el.dataset.store); save(); renderSettings(); renderSidebarBottom(); },
  addStore(){ addStore(); },
  openAddRecurringModal(){ openAddRecurringModal(); },
  setIntervalPreset(el){ newRecInterval=parseInt(el.dataset.days); newRecCustom=false;
    document.getElementById('rec-custom-wrap').style.display='none';
    document.querySelectorAll('#rec-presets .preset-pill').forEach(p=>p.classList.remove('active'));
    el.classList.add('active'); updateRecPreview(); },
  toggleRecCustom(el){ newRecCustom=true; document.getElementById('rec-custom-wrap').style.display='block';
    document.querySelectorAll('#rec-presets .preset-pill').forEach(p=>p.classList.remove('active')); el.classList.add('active');
    const ci=document.getElementById('rec-custom'); ci.focus(); ci.oninput=updateRecPreview; updateRecPreview(); },
  saveNewRecurring(){
    const item=document.getElementById('rec-item').value.trim(); if(!item){ showToast('Enter an item'); return; }
    const iv=curRecInterval(); if(!iv){ showToast('Pick an interval'); return; }
    const store=document.getElementById('rec-store').value.trim(); rememberStore(store);
    STATE.recurring.push({ id:genId(), item, store,
      category:document.getElementById('rec-category').value, interval:iv, lastBought:document.getElementById('rec-last').value||today() });
    save(); closeModal(); showToast('Recurring item added'); renderSettings(); renderSidebarBottom();
  },
  deleteRecurring(el){ STATE.recurring=STATE.recurring.filter(x=>x.id!==el.dataset.id); save(); renderSettings(); renderSidebarBottom(); },
  authToggle(){ authMode = authMode==='login'?'signup':'login'; renderAuthCard(); },
  async authSubmit(){
    if(!SB) return;
    const email=document.getElementById('auth-email').value.trim();
    const pass=document.getElementById('auth-pass').value;
    if(!email || !pass){ authMsg('Enter your email and password'); return; }
    authMsg(authMode==='login'?'Logging in…':'Creating account…', true);
    try{
      if(authMode==='login'){
        const { error } = await SB.auth.signInWithPassword({ email, password:pass });
        if(error){ authMsg(error.message); return; }
        showToast('Logged in');
      } else {
        const { data, error } = await SB.auth.signUp({ email, password:pass });
        if(error){ authMsg(error.message); return; }
        if(data.session){ showToast('Account created'); }
        else { authMode='login'; renderAuthCard(); authMsg('Account created — check your email to confirm, then log in.', true); }
      }
    }catch(e){ authMsg(e.message||'Something went wrong'); }
  },
  logout(){ doLogout(); },
  openLogin(){ showAuthOverlay(); },
  resetData(){ if(confirm('Reset everything to sample data? This will overwrite your current data.')){ resetToSampleData(); showToast('Sample data restored'); goTo('dashboard'); } },
  clearData(){ if(confirm('Clear ALL data? This cannot be undone.')){ Object.assign(STATE,{ expenses:[], groceryList:[], recurring:[], budgets:{}, stores:[], funExpenses:[], wishlist:[], funBudgets:{} }); save(); showToast('All data cleared'); goTo('dashboard'); } }
};

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const fn=ACTIONS[el.dataset.action]; if(fn){ e.preventDefault(); fn(el); }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.target.id==='quick-input'){ e.preventDefault(); ACTIONS.submitQuick(); }
});

/* ===================== CSV EXPORT ===================== */
function exportCSV(){
  const h=['Date','Item','Qty','Price','Total','Store','Category','Unit','Note','Meal'];
  const rows=[...STATE.expenses].sort((a,b)=>b.date.localeCompare(a.date))
    .map(e=>[e.date,e.item,e.qty,e.price,(e.price*e.qty).toFixed(2),e.store,e.category,e.unit||'',e.note||'',e.meal||'']);
  const csv=[h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='cartwise_expenses.csv'; a.click();
  showToast('CSV exported');
}

/* ===================== INIT ===================== */
document.addEventListener('DOMContentLoaded',async()=>{
  load();
  goTo('dashboard');
  try{ await initCloud(); }catch(e){ console.error('Cloud init failed:', e); }
});
</script>
